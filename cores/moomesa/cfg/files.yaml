moomesa:
  - get:
    - "*.v"
    # ⛔ ses.25: sin este "*.sv" el FORK del motor de sprites (k053246.sv, k053246_scan.sv) NO llega
    # a SINTESIS. Se detecto porque el files.qip generado listaba `jtsimson_obj.v` de simson y ni un
    # solo fichero del fork => el .rbf construido a las 09:15 del 2026-07-20 lleva el motor de
    # sprites VIEJO, no el fork. Misma familia que el bug de harness de la ses.19 (§H23), pero en el
    # camino de sintesis: el sim probaba una cosa y Quartus construia otra.
    - "*.sv"
riders:
  - get:
    - common.yaml
# ⛔ NO se listan ya los modulos de sprites de simson (jt053246.sv, jt053246_scan.sv, jtsimson_obj.v):
# cowboys tiene su propio FORK renombrado (k053246*, cowboys_obj.v) desde la ses.24. Listarlos solo
# metia codigo muerto en el proyecto. Ver la cabecera de k053246_scan.sv.
jtframe:
  - from: video/layouts
    get:
      - jtframe_8x8x4_packed_msb.v
# El modulo PCM es PROPIO: cores/moomesa/hdl/k054539.v (recogido por 'cowboys: *.v'), escrito de cero
# contra el golden de MAME (k054539.cpp) + RE de Furrtek. NO se usa el 'jt539:' privado de Jotego
# (sponsor-gated, no clonable). ESTADO: stub transitorio (DSP de canales pendiente Fase 3); ya hace el
# read-back de registros que el POST necesita para arrancar. Ver ver/moomesa/k054539_ref.cpp (referencia).
